# Scenario: Pod stuck in Pending — referenced ConfigMap does not exist
# The pod expects a ConfigMap volume that was never created.
# Kubernetes marks the pod as Pending with FailedMount event.
#
# Apply:   kubectl apply -f tests/scenarios/configmap-missing.yaml
# Cleanup: kubectl delete -f tests/scenarios/configmap-missing.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-missing-demo
  namespace: default
  labels:
    scenario: configmap-missing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configmap-missing-demo
  template:
    metadata:
      labels:
        app: configmap-missing-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["/bin/sh", "-c", "cat /config/app.properties && sleep 3600"]
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          configMap:
            name: app-config-does-not-exist   # ConfigMap that was never created
