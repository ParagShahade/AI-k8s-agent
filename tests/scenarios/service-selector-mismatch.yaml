# Scenario: Service Selector Mismatch
# The Deployment's pods have label app=selector-demo-app, but the Service
# selects app=wrong-label — no endpoints are registered, traffic never reaches the pod.
#
# Apply:   kubectl apply -f tests/scenarios/service-selector-mismatch.yaml
# Cleanup: kubectl delete -f tests/scenarios/service-selector-mismatch.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selector-demo-app
  namespace: default
  labels:
    scenario: service-selector-mismatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selector-demo-app
  template:
    metadata:
      labels:
        app: selector-demo-app   # <-- correct pod label
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: selector-demo-svc
  namespace: default
  labels:
    scenario: service-selector-mismatch
spec:
  selector:
    app: wrong-label             # <-- intentionally wrong: won't match any pod
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
