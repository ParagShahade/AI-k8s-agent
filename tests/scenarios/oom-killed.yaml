# Scenario: OOMKilled
# The container allocates more memory than its limit allows.
# The kernel OOM killer terminates the process; Kubernetes records OOMKilled.
#
# Apply:   kubectl apply -f tests/scenarios/oom-killed.yaml
# Cleanup: kubectl delete -f tests/scenarios/oom-killed.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: default
  labels:
    scenario: oom-killed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
        - name: memory-hog
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 -c "
              print('Allocating memory...')
              # Allocate 200 MB inside a container limited to 32 Mi — triggers OOMKill
              data = bytearray(200 * 1024 * 1024)
              print('Done (should not reach here)')
              "
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "32Mi"   # Very low — OOMKill is guaranteed
              cpu: "100m"
